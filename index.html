<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tra cứu hồ sơ CCCD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <section class="topbar">
      <div>
        <div class="eyebrow">CCCD RECORDS</div>
        <h1>Tra cứu hồ sơ</h1>
        <div id="backendHint" class="backend-hint">Backend mặc định: http://192.168.1.161:8010 (lọc ngày để trống = mọi lúc)</div>
      </div>
    </section>

    <section class="panel">
      <div class="search-grid">
        <input id="searchInput" placeholder="Tìm theo tên, CCCD, CMND cũ, số điện thoại..." />
        <input id="fromDateInput" type="date" placeholder="Từ ngày (để trống = mọi lúc)" />
        <input id="toDateInput" type="date" placeholder="Đến ngày (để trống = mọi lúc)" />
        <button id="searchBtn">Lọc</button>
        <button id="exportExcelBtn" class="secondary-btn">Xuất Excel</button>
      </div>
      <div class="table-wrap">
        <table class="records-table">
          <thead>
            <tr>
              <th>STT</th>
              <th>Họ tên</th>
              <th>Số CCCD</th>
              <th>Ngày sinh</th>
              <th>Giới tính</th>
              <th>Số điện thoại</th>
              <th>Ngày thu thập</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="prevPageBtn" class="secondary-btn">Trang trước</button>
        <span id="pageInfo">Trang 1 / 1</span>
        <button id="nextPageBtn" class="secondary-btn">Trang sau</button>
      </div>
    </section>

    <section class="panel detail-panel">
      <div class="detail-head">
        <h2>Chi tiết hồ sơ</h2>
        <div class="actions">
          <button id="copyJsonBtn">Copy JSON</button>
          <button id="printBtn">In A4</button>
        </div>
      </div>
      <div id="detailContent" class="detail-content">Chọn một hồ sơ để xem chi tiết.</div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
